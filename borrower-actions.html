<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrower Actions - Money Lending Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2026.04.02.2" />
  </head>
  <body class="dashboard-page">
    <div id="appStatus" class="app-status is-info" role="status" aria-live="polite">
      Loading borrower actions...
    </div>

    <div class="dashboard">
      <nav class="navbar">
        <div class="nav-brand-wrap">
          <h1>Borrower Actions</h1>
          <p class="nav-subtitle">Manage communication and payment actions</p>
        </div>
        <div class="nav-links">
          <button class="nav-link-btn" type="button" onclick="window.location.href='dashboard.html'">
            Back to Borrowers
          </button>
          <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
      </nav>

      <div class="dashboard-content">
        <section class="loans-section">
          <div id="borrowerActionCard" class="borrower-action-card">
            <div class="borrower-loading-state" aria-live="polite">
              <div class="borrower-loading-spinner" aria-hidden="true"></div>
              <p class="borrower-loading-title">Loading borrower details</p>
              <p class="borrower-loading-copy">
                Please wait while we fetch the latest borrower information.
              </p>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script type="module" src="app.js?v=2026.04.02.2"></script>
  </body>
</html>
